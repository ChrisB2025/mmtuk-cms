{% extends "content/base.html" %}

{% block title %}Terms of Engagement{% endblock %}
{% block meta_description %}Our terms of engagement for using MMTUK services.{% endblock %}

{% block content %}
<section class="py-16 md:py-24">
  <div class="px-[5%]">
    <div class="max-w-3xl mx-auto">
      <h4 class="text-2xl font-bold text-downriver mb-2">{{ title }}</h4>
      <p class="text-neutral italic mb-8">Last updated: {{ last_updated }}</p>
      <div class="prose prose-lg max-w-none prose-headings:text-downriver prose-headings:font-bold prose-a:text-accent prose-a:underline hover:prose-a:text-accent-hover prose-strong:text-downriver">
        {{ body_html|safe }}
      </div>
    </div>
  </div>
</section>
{% endblock %}
